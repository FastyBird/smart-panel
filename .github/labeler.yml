# ── Branch-based labels ──

# Base branch (target)
beta:
  - base-branch: ['^beta', 'beta', 'beta*']

alpha:
  - base-branch: ['^alpha', 'alpha', 'alpha*']

latest:
  - base-branch: ['^latest', 'latest', 'latest*']

# Head branch (source)
feature:
  - head-branch: ['^feature/']

fix:
  - head-branch: ['^fix/']

chore:
  - head-branch: ['^chore/']

# ── File-based labels ──

backend:
  - changed-files:
    - any-glob-to-any-file: ['apps/backend/**']

admin:
  - changed-files:
    - any-glob-to-any-file: ['apps/admin/**']

panel:
  - changed-files:
    - any-glob-to-any-file: ['apps/panel/**']

website:
  - changed-files:
    - any-glob-to-any-file: ['apps/website/**']

testing:
  - changed-files:
    - any-glob-to-any-file: ['apps/testing/**']

build:
  - changed-files:
    - any-glob-to-any-file: ['build/**', 'docker/**']

ci:
  - changed-files:
    - any-glob-to-any-file: ['.github/**']

docs:
  - changed-files:
    - any-glob-to-any-file: ['docs/**', '*.md', 'tasks/**']

extensions:
  - changed-files:
    - any-glob-to-any-file: ['packages/**']
