name: "Beta Release"

on:
  push:
    branches:
      - "beta-*.*.*"
      - "beta"
  workflow_dispatch:
    inputs:
      version:
        description: "Base version to release (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-versions:
    name: "Sync packages versions"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Setup Node"
        uses: "actions/setup-node@v6"
        with:
          node-version: "${{ matrix.node-version }}"

      - name: "Sync Versions"
        id: "set-version"
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: "node .github/scripts/monorepo-version-sync.js ${INPUT_VERSION:-${{ github.ref }}} beta"

      - name: "Commit Version Changes"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: sync versions [ci skip]"
            git push
          else
            echo "No version changes to commit."
          fi

  publish-extension-sdk:
    needs: "sync-versions"
    name: "Publish Pre Release Beta Extension SDK"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Build Extension SDK"
        run: "pnpm --filter @fastybird/smart-panel-extension-sdk build"

      - name: "Publish To NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "packages/extension-sdk"
          tag: "beta"
          npm-auth-token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: "Extract Published Version"
        id: "extract-version"
        working-directory: "packages/extension-sdk"
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
        shell: bash

      - name: "Publish To GitHub NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "packages/extension-sdk"
          tag: "beta"
          npm-auth-token: ${{ secrets.GITHUB_TOKEN }}
          npm-registry-url: "https://npm.pkg.github.com"
          npm-registry: "npm.pkg.github.com"

  publish-backend:
    needs: ["sync-versions", "publish-extension-sdk"]
    name: "Publish Pre Release Beta Backend App"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Build App"
        run: "pnpm --filter @fastybird/smart-panel-backend build"

      - name: "Publish To NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "apps/backend"
          tag: "beta"
          npm-auth-token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: "Extract Published Version"
        id: "extract-version"
        working-directory: "apps/backend"
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
        shell: bash

      - name: "Publish To GitHub NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "apps/backend"
          tag: "beta"
          npm-auth-token: ${{ secrets.GITHUB_TOKEN }}
          npm-registry-url: "https://npm.pkg.github.com"
          npm-registry: "npm.pkg.github.com"

  publish-admin:
    needs: ["sync-versions", "publish-extension-sdk"]
    name: "Publish Pre Release Beta Admin App"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Build App"
        run: "pnpm --filter @fastybird/smart-panel-admin build:no-check"

      - name: "Publish To NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "apps/admin"
          tag: "beta"
          npm-auth-token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: "Extract Published Version"
        id: "extract-version"
        working-directory: "apps/admin"
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
        shell: bash

      - name: "Publish To GitHub NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "apps/admin"
          tag: "beta"
          npm-auth-token: ${{ secrets.GITHUB_TOKEN }}
          npm-registry-url: "https://npm.pkg.github.com"
          npm-registry: "npm.pkg.github.com"

  publish-main-package:
    needs: ["sync-versions", "publish-backend", "publish-admin"]
    name: "Publish Pre Release Beta Main Package"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node"
        uses: "actions/setup-node@v6"
        with:
          node-version: "${{ matrix.node-version }}"
          registry-url: "https://registry.npmjs.org"

      - name: "Build Package"
        working-directory: "build"
        run: |
          npm install
          npm run build

      - name: "Publish To NPM"
        working-directory: "build"
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: "Extract Published Version"
        id: "extract-version"
        working-directory: "build"
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
        shell: bash

      - name: "Setup GitHub NPM Registry"
        uses: "actions/setup-node@v6"
        with:
          node-version: "${{ matrix.node-version }}"
          registry-url: "https://npm.pkg.github.com"

      - name: "Publish To GitHub NPM"
        working-directory: "build"
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-display:
    needs: "sync-versions"
    name: "Build Flutter Display App"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        flutter-version: [ "3.27.0" ]
        flutter-channel: [ "stable" ]
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"
  
      - name: "Setup Flutter"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "${{ matrix.flutter-version }}"
          flutter-channel: "${{ matrix.flutter-channel }}"

      - name: "Build ARM64 Flutter Bundle"
        env:
          FB_FLUTTERPI_APP_VERSION: "${{ needs.sync-versions.outputs.version }}"
          FB_FLUTTERPI_APP_BUILD: "${{ needs.sync-versions.outputs.buildNumber }}"
        run: "melos build-panel-arm64-release"

      - name: "Archive ARM64 Flutter Assets"
        run: |
          tar -czvf smart-panel-display-flutterpi-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz -C ./apps/panel/build/flutter_assets .
          shasum -a 256 smart-panel-display-flutterpi-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz > smart-panel-display-flutterpi-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz.sha256

      - name: "Upload ARM64 Artifact for (64-bit)"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-flutterpi-arm64"
          path: |
            smart-panel-display-flutterpi-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz
            smart-panel-display-flutterpi-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz.sha256

  build-android:
    needs: "sync-versions"
    name: "Build Android APK"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        flutter-version: [ "3.27.0" ]
        flutter-channel: [ "stable" ]
        java-version: [ "17" ]
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Setup Java"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{ matrix.java-version }}"

      - name: "Setup Flutter"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "${{ matrix.flutter-version }}"
          flutter-channel: "${{ matrix.flutter-channel }}"

      - name: "Build Android APK"
        env:
          FB_PANEL_APP_VERSION: "${{ needs.sync-versions.outputs.version }}"
          FB_PANEL_APP_BUILD: "${{ needs.sync-versions.outputs.buildNumber }}"
        run: "melos build-panel-apk"

      - name: "Rename APK"
        run: |
          cp ./apps/panel/build/app/outputs/flutter-apk/app-release.apk smart-panel-display-android-${{ needs.sync-versions.outputs.version }}.apk
          shasum -a 256 smart-panel-display-android-${{ needs.sync-versions.outputs.version }}.apk > smart-panel-display-android-${{ needs.sync-versions.outputs.version }}.apk.sha256

      - name: "Upload Android Artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-android"
          path: |
            smart-panel-display-android-${{ needs.sync-versions.outputs.version }}.apk
            smart-panel-display-android-${{ needs.sync-versions.outputs.version }}.apk.sha256

  build-linux-desktop:
    needs: "sync-versions"
    name: "Build Linux Desktop App"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        flutter-version: [ "3.27.0" ]
        flutter-channel: [ "stable" ]
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Install Linux Build Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Setup Flutter"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "${{ matrix.flutter-version }}"
          flutter-channel: "${{ matrix.flutter-channel }}"

      - name: "Enable Linux Desktop"
        run: flutter config --enable-linux-desktop

      - name: "Build Linux Desktop App"
        env:
          FB_PANEL_APP_VERSION: "${{ needs.sync-versions.outputs.version }}"
          FB_PANEL_APP_BUILD: "${{ needs.sync-versions.outputs.buildNumber }}"
        run: "melos build-panel-linux"

      - name: "Archive Linux Desktop App"
        run: |
          tar -czvf smart-panel-display-linux-${{ needs.sync-versions.outputs.version }}-x64.tar.gz -C ./apps/panel/build/linux/x64/release/bundle .
          shasum -a 256 smart-panel-display-linux-${{ needs.sync-versions.outputs.version }}-x64.tar.gz > smart-panel-display-linux-${{ needs.sync-versions.outputs.version }}-x64.tar.gz.sha256

      - name: "Upload Linux Desktop Artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-linux-x64"
          path: |
            smart-panel-display-linux-${{ needs.sync-versions.outputs.version }}-x64.tar.gz
            smart-panel-display-linux-${{ needs.sync-versions.outputs.version }}-x64.tar.gz.sha256

  build-elinux:
    needs: ["sync-versions", "pre-release-beta"]
    name: "Build eLinux Display Apps"
    uses: "./.github/workflows/build-elinux.yml"
    with:
      version: "${{ needs.sync-versions.outputs.version }}"
      build-number: "${{ needs.sync-versions.outputs.buildNumber }}"
      tag_name: "v${{ needs.sync-versions.outputs.version }}"
      target-arch: "all"
    permissions:
      contents: write

  build-application:
    needs: ["sync-versions", "build-display", "publish-admin", "publish-backend"]
    name: "Pre-Build Application"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Remove Monorepo Configuration"
        run: |
          rm ./package.json
          rm ./pnpm-lock.yaml
          rm ./pnpm-workspace.yaml

      - name: "Download Display Assets"
        uses: "actions/download-artifact@v7"
        with:
          name: "display-panel-flutterpi-arm64"

      - name: "Extract Flutter Assets to /build-arm64/display"
        run: |
          mkdir -p ./build-arm64/display
          tar -xzf ./smart-panel-display-flutterpi-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz -C ./build-arm64/display

      - name: "Prepare Build Folder (64-bit)"
        run: |
          cp ./build/package.json ./build-arm64/
          cp ./build/.env.local ./build-arm64/
          cp .env ./build-arm64/
          cp -r var ./build-arm64/

      - name: "Build ARM64 App (64-bit)"
        uses: "pguyot/arm-runner-action@v2"
        with:
          base_image: "raspios_lite_arm64:latest"
          cpu: "cortex-a53"
          cpu_info: "cpuinfo/raspberrypi_zero2_w_arm64"
          image_additional_mb: "4096"
          copy_repository_path: "/opt/smart-panel"
          copy_artifact_path: "smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz;smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz.sha256"
          copy_artifact_dest: "."
          commands: |
            apt-get update
            apt-get install -y curl git jq
            curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
            apt-get install -y nodejs
            cd /opt/smart-panel/build-arm64
            npm add @fastybird/smart-panel-backend@${{ needs.publish-backend.outputs.version }}
            npm add @fastybird/smart-panel-admin@${{ needs.publish-admin.outputs.version }}
            npm install --omit=dev

            # Restructure from npm layout to Raspbian image layout
            BACKEND_DIR="node_modules/@fastybird/smart-panel-backend"
            ADMIN_DIR="node_modules/@fastybird/smart-panel-admin"
            SDK_DIR="node_modules/@fastybird/smart-panel-extension-sdk"

            cp -r "$BACKEND_DIR/dist" ./dist
            mkdir -p ./static
            cp -r "$ADMIN_DIR/dist/"* ./static/
            if [ -d "$SDK_DIR" ]; then
              mkdir -p ./extension-sdk
              cp -r "$SDK_DIR/dist" ./extension-sdk/dist
              cp "$SDK_DIR/package.json" ./extension-sdk/package.json
            fi

            jq '.dependencies["@fastybird/smart-panel-extension-sdk"] = "file:./extension-sdk"
              | del(.dependencies["@fastybird/smart-panel-backend"])
              | del(.dependencies["@fastybird/smart-panel-admin"])' \
              "$BACKEND_DIR/package.json" > ./package.json.tmp
            mv ./package.json.tmp ./package.json

            rm -rf node_modules
            npm install --omit=dev
            rm -f package-lock.json

            cd /opt/smart-panel
            tar -czvf smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz -C ./build-arm64 .
            shasum -a 256 smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz > smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz.sha256

      - name: "Upload ARM64 Artifact (64-bit)"
        uses: "actions/upload-artifact@v7"
        with:
          name: "server-bundle-arm64"
          path: |
            smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz
            smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz.sha256

  pre-release-beta:
    needs: ["sync-versions", "publish-admin", "publish-backend", "build-application", "build-android", "build-linux-desktop"]
    name: "Create Beta Pre Release"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Summary"
        run: |
          echo "### ✅ Beta Release Created: v${{ needs.sync-versions.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Admin App: v${{ needs.publish-admin.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend App: v${{ needs.publish-backend.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Display App: v${{ needs.sync-versions.outputs.version }}" >> $GITHUB_STEP_SUMMARY

      - name: "Download ARM64 Application Build"
        uses: "actions/download-artifact@v7"
        with:
          name: "server-bundle-arm64"

      - name: "Download Android APK"
        uses: "actions/download-artifact@v7"
        with:
          name: "display-panel-android"

      - name: "Download Linux Desktop Build"
        uses: "actions/download-artifact@v7"
        with:
          name: "display-panel-linux-x64"

      - name: "Download flutter-pi ARM64 Build"
        uses: "actions/download-artifact@v7"
        with:
          name: "display-panel-flutterpi-arm64"

      - name: "Prepare Installation Scripts"
        run: |
          chmod +x scripts/install-server.sh
          cp scripts/install-server.sh install-server.sh
          chmod +x scripts/install-display.sh
          cp scripts/install-display.sh install-display.sh

      - name: "Generate version.json"
        run: |
          cat > version.json << VEOF
          {
            "version": "${{ needs.sync-versions.outputs.version }}",
            "build": "$(date -u +%Y-%m-%d)",
            "commit": "${GITHUB_SHA:0:7}",
            "channel": "beta"
          }
          VEOF

      - name: "Create Pre-Release & Upload Assets"
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: v${{ needs.sync-versions.outputs.version }}
          name: v${{ needs.sync-versions.outputs.version }}
          body: |
            Admin App v${{ needs.publish-admin.outputs.version }} & Backend App v${{ needs.publish-backend.outputs.version }} & Display App v${{ needs.sync-versions.outputs.version }}
          prerelease: true
          files: |
            version.json
            smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz
            smart-panel-server-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz.sha256
            smart-panel-display-flutterpi-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz
            smart-panel-display-flutterpi-${{ needs.sync-versions.outputs.version }}-arm64.tar.gz.sha256
            smart-panel-display-android-${{ needs.sync-versions.outputs.version }}.apk
            smart-panel-display-android-${{ needs.sync-versions.outputs.version }}.apk.sha256
            smart-panel-display-linux-${{ needs.sync-versions.outputs.version }}-x64.tar.gz
            smart-panel-display-linux-${{ needs.sync-versions.outputs.version }}-x64.tar.gz.sha256
            install-server.sh
            install-display.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Cleanup Old Beta Pre-Releases"
        run: |
          gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease) | select(.tagName | test("beta"; "i"))] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' | \
            while read -r tag; do
              echo "Deleting old beta pre-release: $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-raspbian:
    needs: ["sync-versions", "pre-release-beta"]
    name: "Build Raspbian Images"
    uses: "./.github/workflows/build-raspbian-image.yml"
    with:
      version: "${{ needs.sync-versions.outputs.version }}"
      tag_name: "v${{ needs.sync-versions.outputs.version }}"
    permissions:
      contents: write

  build-docker:
    needs: "sync-versions"
    name: "Build & Push Docker Image"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@v4"

      - name: "Set up QEMU"
        uses: "docker/setup-qemu-action@v4"

      - name: "Login to GitHub Container Registry"
        uses: "docker/login-action@v4"
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and Push Docker Image"
        uses: "docker/build-push-action@v7"
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/fastybird/smart-panel:beta
            ghcr.io/fastybird/smart-panel:${{ needs.sync-versions.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-to-discord:
    needs: [ "sync-versions", "publish-admin", "publish-backend", "build-application", "pre-release-beta", "build-docker" ]
    name: "Discord Webhooks"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Send Discord Notification"
        uses: "./.github/actions/send-discord-notification"
        with:
          title: "FastyBird Smart Panel Beta Release"
          description: "Version v${{ needs.sync-versions.outputs.version }}"
          url: "https://github.com/fastybird/smart-panel/releases/tag/v${{ needs.sync-versions.outputs.version }}"
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
