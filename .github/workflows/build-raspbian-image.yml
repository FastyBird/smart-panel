name: Build Raspbian Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image name suffix (e.g. "beta", "rc1")'
        required: false
        default: ''
  release:
    types: [published]

jobs:
  build:
    name: "Build Raspberry Pi Image"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version: 24

      - name: "Install pnpm"
        run: "npm install -g pnpm@10.12.0"

      - name: "Install dependencies"
        run: "pnpm install --frozen-lockfile"

      - name: "Free disk space"
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h

      - name: "Set up QEMU for ARM64 emulation"
        uses: "docker/setup-qemu-action@v3"
        with:
          platforms: "arm64"

      - name: "Build image"
        run: |
          cd build/raspbian
          ./build.sh

      - name: "Rename output"
        run: |
          cd build/raspbian/output
          VERSION="${GITHUB_REF_NAME:-dev}"
          VERSION="${VERSION//\//-}"
          if [ -n "$IMAGE_SUFFIX" ]; then
            VERSION="${VERSION}-${IMAGE_SUFFIX}"
          fi
          for f in smart-panel-*; do
            NEW_NAME=$(echo "$f" | sed "s/smart-panel-[^-]*-/smart-panel-${VERSION}-/")
            if [ "$f" != "$NEW_NAME" ]; then
              mv "$f" "$NEW_NAME"
            fi
          done
          ls -lh
        env:
          IMAGE_SUFFIX: "${{ github.event.inputs.image_name }}"

      - name: "Upload image artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "smart-panel-image-arm64"
          path: "build/raspbian/output/*"
          retention-days: 30

      - name: "Upload to release"
        if: "github.event_name == 'release'"
        uses: "softprops/action-gh-release@v2"
        with:
          files: "build/raspbian/output/*"
