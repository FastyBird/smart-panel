name: Build Raspbian Image

on:
  workflow_call:
    inputs:
      variant:
        description: 'Image variant to build'
        type: string
        default: 'all'
      version:
        description: 'Version string for image naming'
        type: string
        required: true
      tag_name:
        description: 'Release tag to upload artifacts to'
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      variant:
        description: 'Image variant to build'
        required: true
        type: choice
        options:
          - server
          - aio
          - display
          - all
        default: 'server'
      image_name:
        description: 'Image name suffix (e.g. "beta", "rc1")'
        required: false
        default: ''
  release:
    types: [published]

jobs:
  matrix-setup:
    name: "Setup build matrix"
    runs-on: "ubuntu-latest"
    outputs:
      variants: "${{ steps.set-matrix.outputs.variants }}"
    steps:
      - name: "Determine variants to build"
        id: "set-matrix"
        run: |
          VARIANT="${{ inputs.variant || 'all' }}"
          if [ "${VARIANT}" = "all" ]; then
            echo 'variants=["server","aio","display"]' >> "$GITHUB_OUTPUT"
          else
            echo "variants=[\"${VARIANT}\"]" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: "Build ${{ matrix.variant }}"
    needs: "matrix-setup"
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        variant: "${{ fromJson(needs.matrix-setup.outputs.variants) }}"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version: 24

      - name: "Install pnpm"
        run: "npm install -g pnpm@10.12.0"

      - name: "Install dependencies"
        run: "pnpm install --frozen-lockfile"

      - name: "Setup Flutter and Dart"
        if: "matrix.variant == 'aio' || matrix.variant == 'display'"
        uses: "subosito/flutter-action@v2"
        with:
          flutter-version: "3.27.4"

      - name: "Install Melos"
        if: "matrix.variant == 'aio' || matrix.variant == 'display'"
        run: "dart pub global activate melos"

      - name: "Free disk space and add swap"
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          df -h

      - name: "Set up QEMU for ARM64 emulation"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support
          sudo ln -sf /usr/bin/qemu-aarch64-static /usr/bin/qemu-aarch64

      - name: "Build image"
        run: |
          cd build/raspbian
          ./build.sh --variant=${{ matrix.variant }}

      - name: "Rename output"
        run: |
          cd build/raspbian/output
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
          else
            VERSION="${GITHUB_REF_NAME:-dev}"
            VERSION="${VERSION//\//-}"
          fi
          if [ -n "$IMAGE_SUFFIX" ]; then
            VERSION="${VERSION}-${IMAGE_SUFFIX}"
          fi
          for f in smart-panel-*; do
            # Replace the version segment (last part before -arm64) with the release version
            NEW_NAME=$(echo "$f" | sed "s/-[^-]*-arm64/-${VERSION}-arm64/")
            if [ "$f" != "$NEW_NAME" ]; then
              mv "$f" "$NEW_NAME"
            fi
          done
          ls -lh
        env:
          IMAGE_SUFFIX: "${{ github.event.inputs.image_name || '' }}"
          VERSION_OVERRIDE: "${{ inputs.version || '' }}"

      - name: "Upload image artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "smart-panel-${{ matrix.variant }}-image-arm64"
          path: "build/raspbian/output/*"
          retention-days: 30

      - name: "Upload to release"
        if: "github.event_name == 'release' || inputs.tag_name != ''"
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: "${{ inputs.tag_name || github.ref_name }}"
          files: "build/raspbian/output/*"
