name: "Deploy Testing App"

on:
  push:
    branches:
      - "main"
    paths:
      - "apps/testing/**"
  workflow_dispatch:

concurrency:
  group: "deploy-testing"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Build and deploy testing app to Cloudflare Pages"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        operating-system: [ "ubuntu-latest" ]

    permissions:
      contents: read
      deployments: write

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Lint"
        run: "pnpm --filter @fastybird/smart-panel-testing lint:js"

      - name: "Type Check"
        run: "pnpm --filter @fastybird/smart-panel-testing type-check"

      - name: "Build"
        run: "pnpm --filter @fastybird/smart-panel-testing build"

      - name: "Deploy to Cloudflare Pages"
        uses: "cloudflare/wrangler-action@v3"
        with:
          apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          accountId: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          command: "pages deploy apps/testing/dist --project-name=fastybird-smart-panel-testing --branch=main"
          packageManager: "npx"
