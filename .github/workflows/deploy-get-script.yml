name: "Deploy Get Script"

on:
  push:
    branches:
      - "main"
    paths:
      - "apps/get-script/**"
      - "scripts/install.sh"
      - "scripts/install-panel.sh"
  workflow_dispatch:

concurrency:
  group: "deploy-get-script"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy get-script site to Cloudflare Pages"
    runs-on: "ubuntu-latest"

    permissions:
      contents: read
      deployments: write

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Prepare output directory"
        run: "cp apps/get-script/_worker.js apps/get-script/public/_worker.js"

      - name: "Create Cloudflare Pages project (if not exists)"
        run: "npx wrangler@4 pages project create fastybird-smart-panel-get-script --production-branch=main 2>/dev/null || true"
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

      - name: "Deploy to Cloudflare Pages"
        run: "npx wrangler@4 pages deploy apps/get-script/public --project-name=fastybird-smart-panel-get-script --branch=main"
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
