name: "Build eLinux Display App"

on:
  workflow_dispatch:
    inputs:
      target-arch:
        description: "Target architecture"
        required: true
        default: "arm64"
        type: choice
        options:
          - x64
          - arm64

jobs:
  build:
    name: "Build eLinux (${{ inputs.target-arch }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "24"
          pnpm-version: "10.12.0"

      - name: "Setup Flutter Project"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "3.27.4"
          flutter-channel: "stable"

      - name: "Setup flutter-elinux"
        uses: "./.github/actions/setup-flutter-elinux"
        with:
          target-arch: "${{ inputs.target-arch }}"

      - name: "Build eLinux x64 App"
        if: inputs.target-arch == 'x64'
        run: |
          cd apps/panel
          flutter-elinux build elinux --release \
            --target-backend-type=gbm \
            --dart-define=APP_VERSION=1.0.0 \
            --dart-define=APP_BUILD=1

      - name: "Build eLinux ARM64 App"
        if: inputs.target-arch == 'arm64'
        run: |
          cd apps/panel
          flutter-elinux build elinux --release \
            --target-backend-type=gbm \
            --target-arch=arm64 \
            --target-compiler-triple=aarch64-linux-gnu \
            --target-sysroot=/ \
            --dart-define=APP_VERSION=1.0.0 \
            --dart-define=APP_BUILD=1

      - name: "Package artifact"
        env:
          ARCH: "${{ inputs.target-arch }}"
        run: |
          tar -czvf "smart-panel-display-elinux-${ARCH}.tar.gz" \
            -C "./apps/panel/build/elinux/${ARCH}/release/bundle" .

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "smart-panel-elinux-${{ inputs.target-arch }}"
          path: "smart-panel-display-elinux-${{ inputs.target-arch }}.tar.gz"
          retention-days: 14
