name: "Build eLinux Display App"

on:
  workflow_call:
    inputs:
      version:
        description: "Version string for the build"
        type: string
        required: true
      build-number:
        description: "Build number"
        type: string
        default: "1"
      tag_name:
        description: "Release tag to upload artifacts to (empty = skip upload)"
        type: string
        default: ""
      target-arch:
        description: "Target architecture: x64, arm64, or all"
        type: string
        default: "all"
  workflow_dispatch:
    inputs:
      target-arch:
        description: "Target architecture"
        required: true
        default: "arm64"
        type: choice
        options:
          - x64
          - arm64
          - all

permissions:
  contents: write

jobs:
  matrix-setup:
    name: "Setup build matrix"
    runs-on: "ubuntu-latest"
    outputs:
      architectures: "${{ steps.set-matrix.outputs.architectures }}"
    steps:
      - name: "Determine architectures to build"
        id: "set-matrix"
        env:
          TARGET_ARCH: "${{ inputs.target-arch || 'all' }}"
        run: |
          if [ "${TARGET_ARCH}" = "all" ]; then
            echo 'architectures=["x64","arm64"]' >> "$GITHUB_OUTPUT"
          else
            echo "architectures=[\"${TARGET_ARCH}\"]" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: "Build eLinux (${{ matrix.target-arch }})"
    needs: "matrix-setup"
    runs-on: "ubuntu-latest"
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        target-arch: "${{ fromJson(needs.matrix-setup.outputs.architectures) }}"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "24"
          pnpm-version: "10.12.0"

      - name: "Setup Flutter Project"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "3.27.0"
          flutter-channel: "stable"

      - name: "Setup flutter-elinux"
        uses: "./.github/actions/setup-flutter-elinux"
        with:
          target-arch: "${{ matrix.target-arch }}"

      - name: "Build eLinux x64 App"
        if: matrix.target-arch == 'x64'
        env:
          FB_PANEL_APP_VERSION: "${{ inputs.version || '1.0.0' }}"
          FB_PANEL_APP_BUILD: "${{ inputs.build-number || '1' }}"
        run: |
          cd apps/panel
          flutter-elinux build elinux --release \
            --target-backend-type=gbm \
            --dart-define=APP_VERSION=$FB_PANEL_APP_VERSION \
            --dart-define=APP_BUILD=$FB_PANEL_APP_BUILD

      - name: "Build eLinux ARM64 App"
        if: matrix.target-arch == 'arm64'
        env:
          FB_PANEL_APP_VERSION: "${{ inputs.version || '1.0.0' }}"
          FB_PANEL_APP_BUILD: "${{ inputs.build-number || '1' }}"
        run: |
          cd apps/panel
          flutter-elinux build elinux --release \
            --target-backend-type=gbm \
            --target-arch=arm64 \
            --target-compiler-triple=aarch64-linux-gnu \
            --target-sysroot=/ \
            --dart-define=APP_VERSION=$FB_PANEL_APP_VERSION \
            --dart-define=APP_BUILD=$FB_PANEL_APP_BUILD

      - name: "Archive eLinux App"
        env:
          ARCH: "${{ matrix.target-arch }}"
          VERSION: "${{ inputs.version || 'dev' }}"
        run: |
          tar -czvf "smart-panel-display-elinux-${VERSION}-${ARCH}.tar.gz" \
            -C "./apps/panel/build/elinux/${ARCH}/release/bundle" .
          shasum -a 256 "smart-panel-display-elinux-${VERSION}-${ARCH}.tar.gz" \
            > "smart-panel-display-elinux-${VERSION}-${ARCH}.tar.gz.sha256"

      - name: "Upload artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-elinux-${{ matrix.target-arch }}"
          path: |
            smart-panel-display-elinux-${{ inputs.version || 'dev' }}-${{ matrix.target-arch }}.tar.gz
            smart-panel-display-elinux-${{ inputs.version || 'dev' }}-${{ matrix.target-arch }}.tar.gz.sha256
          retention-days: 30

      - name: "Upload to release"
        if: inputs.tag_name != ''
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: "${{ inputs.tag_name }}"
          files: |
            smart-panel-display-elinux-${{ inputs.version || 'dev' }}-${{ matrix.target-arch }}.tar.gz
            smart-panel-display-elinux-${{ inputs.version || 'dev' }}-${{ matrix.target-arch }}.tar.gz.sha256
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
