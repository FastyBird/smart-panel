name: "Build eLinux ARM64 (test)"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "24"
          pnpm-version: "10.12.0"

      - name: "Setup Flutter Project"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "3.27.4"
          flutter-channel: "stable"

      - name: "Setup flutter-elinux"
        run: |
          sudo apt-get update
          sudo apt-get update
          # x86 build tools
          sudo apt-get install -y \
            clang cmake pkg-config \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libstdc++-12-dev-arm64-cross \
            libc6-dev-arm64-cross

          # ARM64 cross-libraries (needed for linking the elinux runner)
          sudo dpkg --add-architecture arm64
          # Add ARM64 package sources (ports.ubuntu.com) — filter non-deb822 files only
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i 's/^deb /deb [arch=amd64] /' "$f"
          done
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libdrm-dev:arm64 \
            libgbm-dev:arm64 \
            libegl-dev:arm64 \
            libinput-dev:arm64 \
            libudev-dev:arm64 \
            libsystemd-dev:arm64 \
            libc6-arm64-cross

          git clone --depth 1 https://github.com/sony/flutter-elinux.git /tmp/flutter-elinux
          sudo mv /tmp/flutter-elinux /opt/flutter-elinux
          echo "/opt/flutter-elinux/bin" >> "$GITHUB_PATH"

      - name: "Prepare eLinux project"
        run: |
          cd apps/panel
          sed -i '/flutterpi_tool/d' pubspec.yaml
          rm -f pubspec.lock
          flutter-elinux create --platforms elinux .
          flutter-elinux pub get

      - name: "Build eLinux ARM64 release"
        run: |
          cd apps/panel
          flutter-elinux build elinux --release \
            --target-backend-type=gbm \
            --target-arch=arm64 \
            --target-compiler-triple=aarch64-linux-gnu \
            --target-sysroot=/ \
            --dart-define=APP_VERSION=1.0.0 \
            --dart-define=APP_BUILD=1

      - name: "Package artifact"
        run: |
          cd apps/panel/build/elinux/arm64/release/bundle
          tar -czvf /tmp/smart-panel-elinux-arm64.tar.gz .

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: smart-panel-elinux-arm64
          path: /tmp/smart-panel-elinux-arm64.tar.gz
          retention-days: 7
