name: "Build eLinux ARM64 (test)"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "24"
          pnpm-version: "10.12.0"

      - name: "Setup Flutter Project"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "3.27.4"
          flutter-channel: "stable"

      - name: "Setup flutter-elinux"
        run: |
          sudo apt-get update
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake pkg-config \
            libegl1-mesa-dev libgles2-mesa-dev \
            libxkbcommon-dev \
            libdrm-dev libgbm-dev \
            libinput-dev libudev-dev libsystemd-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libstdc++-12-dev-arm64-cross \
            libc6-dev-arm64-cross \
            libc6-arm64-cross

          # Fix ARM64 sysroot for cross-compilation.
          # Ubuntu installs cross libs to /usr/aarch64-linux-gnu/ but the actual
          # shared objects (libc, libm, etc.) live under a nested lib/ path that
          # clang's --sysroot can't find. Symlink them to where the linker expects.
          echo "=== Fixing ARM64 sysroot ==="
          echo "Looking for libm..."
          find /usr/aarch64-linux-gnu -name "libm.so*" -o -name "libm-*.so" 2>/dev/null
          find /usr -path "*/aarch64*" -name "libm.so*" 2>/dev/null

          # Create symlinks from wherever the libs actually are
          for dir in /usr/aarch64-linux-gnu/lib /usr/lib/aarch64-linux-gnu; do
            if [ -d "$dir" ]; then
              for f in "$dir"/*.so* "$dir"/*.a; do
                [ -e "$f" ] && sudo ln -sf "$f" /usr/aarch64-linux-gnu/lib/ 2>/dev/null || true
              done
            fi
          done
          echo "=== Sysroot contents ==="
          ls /usr/aarch64-linux-gnu/lib/libm* 2>/dev/null || echo "libm still missing!"
          git clone --depth 1 https://github.com/sony/flutter-elinux.git /tmp/flutter-elinux
          sudo mv /tmp/flutter-elinux /opt/flutter-elinux
          echo "/opt/flutter-elinux/bin" >> "$GITHUB_PATH"

      - name: "Prepare eLinux project"
        run: |
          cd apps/panel
          sed -i '/flutterpi_tool/d' pubspec.yaml
          rm -f pubspec.lock
          flutter-elinux create --platforms elinux .
          flutter-elinux pub get

      - name: "Build eLinux ARM64 release"
        run: |
          cd apps/panel
          flutter-elinux build elinux --release \
            --target-backend-type=gbm \
            --target-arch=arm64 \
            --target-compiler-triple=aarch64-linux-gnu \
            --target-sysroot=/usr/aarch64-linux-gnu \
            --dart-define=APP_VERSION=1.0.0 \
            --dart-define=APP_BUILD=1

      - name: "Package artifact"
        run: |
          cd apps/panel/build/elinux/arm64/release/bundle
          tar -czvf /tmp/smart-panel-elinux-arm64.tar.gz .

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: smart-panel-elinux-arm64
          path: /tmp/smart-panel-elinux-arm64.tar.gz
          retention-days: 7
