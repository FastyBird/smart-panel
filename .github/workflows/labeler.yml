name: "Labeler"

on:
  pull_request_target: # required for auto labeler
    types:
      - "opened"
      - "reopened"
      - "synchronize"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  labeler:
    name: "Labeler"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Label"
        uses: "actions/labeler@v6"
