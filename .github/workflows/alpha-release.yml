name: "Alpha Release"

on:
  push:
    branches:
      - "alpha-*.*.*"
      - "alpha"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-versions:
    name: "Sync packages versions"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Setup Node"
        uses: "actions/setup-node@v6"
        with:
          node-version: "${{ matrix.node-version }}"

      - name: "Sync Versions"
        id: "set-version"
        run: "node .github/scripts/monorepo-version-sync.js ${{ github.ref }} alpha"

      - name: "Commit Version Changes"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: sync versions [ci skip]"
            git push
          else
            echo "No version changes to commit."
          fi

  publish-extension-sdk:
    needs: "sync-versions"
    name: "Publish Pre Release Alpha Extension SDK"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Build Extension SDK"
        run: "pnpm --filter @fastybird/smart-panel-extension-sdk build"

      - name: "Publish To NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "packages/extension-sdk"
          tag: "alpha"
          npm-auth-token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: "Extract Published Version"
        id: "extract-version"
        working-directory: "packages/extension-sdk"
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
        shell: bash

      - name: "Publish To GitHub NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "packages/extension-sdk"
          tag: "alpha"
          npm-auth-token: ${{ secrets.GITHUB_TOKEN }}
          npm-registry-url: "https://npm.pkg.github.com"
          npm-registry: "npm.pkg.github.com"

  publish-backend:
    needs: ["sync-versions", "publish-extension-sdk"]
    name: "Publish Pre Release Alpha Backend App"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Build App"
        run: "pnpm --filter @fastybird/smart-panel-backend build"

      - name: "Publish To NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "apps/backend"
          tag: "alpha"
          npm-auth-token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: "Extract Published Version"
        id: "extract-version"
        working-directory: "apps/backend"
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
        shell: bash

      - name: "Publish To GitHub NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "apps/backend"
          tag: "alpha"
          npm-auth-token: ${{ secrets.GITHUB_TOKEN }}
          npm-registry-url: "https://npm.pkg.github.com"
          npm-registry: "npm.pkg.github.com"

  publish-admin:
    needs: ["sync-versions", "publish-extension-sdk"]
    name: "Publish Pre Release Alpha Admin App"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Build App"
        run: "pnpm --filter @fastybird/smart-panel-admin build"

      - name: "Publish To NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "apps/admin"
          tag: "alpha"
          npm-auth-token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: "Extract Published Version"
        id: "extract-version"
        working-directory: "apps/admin"
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
        shell: bash

      - name: "Publish To GitHub NPM"
        uses: "./.github/actions/publish-npm-package"
        with:
          package-path: "apps/admin"
          tag: "alpha"
          npm-auth-token: ${{ secrets.GITHUB_TOKEN }}
          npm-registry-url: "https://npm.pkg.github.com"
          npm-registry: "npm.pkg.github.com"

  publish-main-package:
    needs: ["sync-versions", "publish-backend", "publish-admin"]
    name: "Publish Pre Release Alpha Main Package"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        operating-system: [ "ubuntu-latest" ]

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node"
        uses: "actions/setup-node@v6"
        with:
          node-version: "${{ matrix.node-version }}"
          registry-url: "https://registry.npmjs.org"

      - name: "Build Package"
        working-directory: "build"
        run: |
          npm install
          npm run build

      - name: "Publish To NPM"
        working-directory: "build"
        run: npm publish --access public --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: "Extract Published Version"
        id: "extract-version"
        working-directory: "build"
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
        shell: bash

      - name: "Setup GitHub NPM Registry"
        uses: "actions/setup-node@v6"
        with:
          node-version: "${{ matrix.node-version }}"
          registry-url: "https://npm.pkg.github.com"

      - name: "Publish To GitHub NPM"
        working-directory: "build"
        run: npm publish --access public --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-display:
    needs: "sync-versions"
    name: "Build Flutter Display App"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        flutter-version: [ "3.27.0" ]
        flutter-channel: [ "stable" ]
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Setup Flutter"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "${{ matrix.flutter-version }}"
          flutter-channel: "${{ matrix.flutter-channel }}"

      - name: "Build ARMv7 Flutter Bundle (32-bit)"
        env:
          FB_FLUTTERPI_APP_VERSION: "${{ needs.sync-versions.outputs.version }}"
          FB_FLUTTERPI_APP_BUILD: "${{ needs.sync-versions.outputs.buildNumber }}"
        run: "melos build-panel-arm-release"

      - name: "Archive ARMv7 Flutter Assets (32-bit)"
        run: |
          tar -czvf smart-panel-display-armv7.tar.gz -C ./apps/panel/build/flutter_assets .
          shasum -a 256 smart-panel-display-armv7.tar.gz > smart-panel-display-armv7.tar.gz.sha256

      - name: "Upload ARMv7 Artifact (32-bit)"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-armv7"
          path: |
            smart-panel-display-armv7.tar.gz
            smart-panel-display-armv7.tar.gz.sha256

      - name: "Build ARM64 Flutter Bundle for (64-bit)"
        env:
          FB_FLUTTERPI_APP_VERSION: "${{ needs.sync-versions.outputs.version }}"
          FB_FLUTTERPI_APP_BUILD: "${{ needs.sync-versions.outputs.buildNumber }}"
        run: "melos build-panel-arm64-release"

      - name: "Archive ARM64 Flutter Assets for (64-bit)"
        run: |
          tar -czvf smart-panel-display-arm64.tar.gz -C ./apps/panel/build/flutter_assets .
          shasum -a 256 smart-panel-display-arm64.tar.gz > smart-panel-display-arm64.tar.gz.sha256

      - name: "Upload ARM64 Artifact for (64-bit)"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-arm64"
          path: |
            smart-panel-display-arm64.tar.gz
            smart-panel-display-arm64.tar.gz.sha256

  build-android:
    needs: "sync-versions"
    name: "Build Android APK"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        flutter-version: [ "3.27.0" ]
        flutter-channel: [ "stable" ]
        java-version: [ "17" ]
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Setup Java"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{ matrix.java-version }}"

      - name: "Setup Flutter"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "${{ matrix.flutter-version }}"
          flutter-channel: "${{ matrix.flutter-channel }}"

      - name: "Build Android APK"
        env:
          FB_PANEL_APP_VERSION: "${{ needs.sync-versions.outputs.version }}"
          FB_PANEL_APP_BUILD: "${{ needs.sync-versions.outputs.buildNumber }}"
        run: "melos build-panel-apk"

      - name: "Rename APK"
        run: |
          cp ./apps/panel/build/app/outputs/flutter-apk/app-release.apk smart-panel-display-android.apk
          shasum -a 256 smart-panel-display-android.apk > smart-panel-display-android.apk.sha256

      - name: "Upload Android Artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-android"
          path: |
            smart-panel-display-android.apk
            smart-panel-display-android.apk.sha256

  build-linux-desktop:
    needs: "sync-versions"
    name: "Build Linux Desktop App"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        flutter-version: [ "3.27.0" ]
        flutter-channel: [ "stable" ]
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Install Linux Build Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Setup Flutter"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "${{ matrix.flutter-version }}"
          flutter-channel: "${{ matrix.flutter-channel }}"

      - name: "Enable Linux Desktop"
        run: flutter config --enable-linux-desktop

      - name: "Build Linux Desktop App"
        env:
          FB_PANEL_APP_VERSION: "${{ needs.sync-versions.outputs.version }}"
          FB_PANEL_APP_BUILD: "${{ needs.sync-versions.outputs.buildNumber }}"
        run: "melos build-panel-linux"

      - name: "Archive Linux Desktop App"
        run: |
          tar -czvf smart-panel-display-linux-x64.tar.gz -C ./apps/panel/build/linux/x64/release/bundle .
          shasum -a 256 smart-panel-display-linux-x64.tar.gz > smart-panel-display-linux-x64.tar.gz.sha256

      - name: "Upload Linux Desktop Artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-linux-x64"
          path: |
            smart-panel-display-linux-x64.tar.gz
            smart-panel-display-linux-x64.tar.gz.sha256

  build-elinux:
    needs: "sync-versions"
    name: "Build eLinux App (DRM-GBM)"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        flutter-version: [ "3.27.0" ]
        flutter-channel: [ "stable" ]
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Setup Flutter"
        uses: "./.github/actions/setup-flutter-project"
        with:
          flutter-version: "${{ matrix.flutter-version }}"
          flutter-channel: "${{ matrix.flutter-channel }}"

      - name: "Setup flutter-elinux"
        uses: "./.github/actions/setup-flutter-elinux"
        with:
          target-arch: "x64"

      - name: "Build eLinux x64 App"
        env:
          FB_PANEL_APP_VERSION: "${{ needs.sync-versions.outputs.version }}"
          FB_PANEL_APP_BUILD: "${{ needs.sync-versions.outputs.buildNumber }}"
        run: "melos build-panel-elinux"

      - name: "Archive eLinux App"
        run: |
          tar -czvf smart-panel-display-elinux-x64.tar.gz -C ./apps/panel/build/elinux/x64/release/bundle .
          shasum -a 256 smart-panel-display-elinux-x64.tar.gz > smart-panel-display-elinux-x64.tar.gz.sha256

      - name: "Upload eLinux Artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "display-panel-elinux-x64"
          path: |
            smart-panel-display-elinux-x64.tar.gz
            smart-panel-display-elinux-x64.tar.gz.sha256

  build-application:
    needs: ["sync-versions", "build-display", "publish-admin", "publish-backend"]
    name: "Pre-Build Application"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Remove Monorepo Configuration"
        run: |
          rm ./package.json
          rm ./pnpm-lock.yaml
          rm ./pnpm-workspace.yaml

      - name: "Download Display Assets (32-bit)"
        uses: "actions/download-artifact@v7"
        with:
          name: display-panel-armv7

      - name: "Extract Flutter Assets to /build/display-armv7"
        run: |
          mkdir -p ./build-armv7/display
          tar -xzf ./smart-panel-display-armv7.tar.gz -C ./build-armv7/display

      - name: "Prepare Build Folder (32-bit)"
        run: |
          cp ./build/package.json ./build-armv7/
          cp ./build/.env.local ./build-armv7/
          cp .env ./build-armv7/
          cp -r var ./build-armv7/

      - name: "Build ARMv7 App (32-bit)"
        uses: "pguyot/arm-runner-action@v2"
        with:
          base_image: "raspios_lite:latest"
          cpu: "cortex-a7"
          cpu_info: "cpuinfo/raspberrypi_zero2_w"
          image_additional_mb: "4096"
          copy_repository_path: "/opt/smart-panel"
          copy_artifact_path: "smart-panel-server-armv7.tar.gz;smart-panel-server-armv7.tar.gz.sha256"
          copy_artifact_dest: "."
          commands: |
            apt-get update
            apt-get install -y curl git
            curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
            apt-get install -y nodejs
            cd /opt/smart-panel/build-armv7
            npm add @fastybird/smart-panel-backend@${{ needs.publish-backend.outputs.version }}
            npm add @fastybird/smart-panel-admin@${{ needs.publish-admin.outputs.version }}
            npm install --omit=dev
            cd /opt/smart-panel
            tar -czvf smart-panel-server-armv7.tar.gz -C ./build-armv7 .
            shasum -a 256 smart-panel-server-armv7.tar.gz > smart-panel-server-armv7.tar.gz.sha256

      - name: "Upload ARMv7 Artifact (32-bit)"
        uses: "actions/upload-artifact@v7"
        with:
          name: "server-bundle-armv7"
          path: |
            smart-panel-server-armv7.tar.gz
            smart-panel-server-armv7.tar.gz.sha256

      - name: "Download Display Assets (64-bit)"
        uses: "actions/download-artifact@v7"
        with:
          name: "display-panel-arm64"

      - name: "Extract Flutter Assets to /build-arm64/display"
        run: |
          mkdir -p ./build-arm64/display
          tar -xzf ./smart-panel-display-arm64.tar.gz -C ./build-arm64/display

      - name: "Prepare Build Folder (64-bit)"
        run: |
          cp ./build/package.json ./build-arm64/
          cp ./build/.env.local ./build-arm64/
          cp .env ./build-arm64/
          cp -r var ./build-arm64/

      - name: "Build ARM64 App (64-bit)"
        uses: "pguyot/arm-runner-action@v2"
        with:
          base_image: "raspios_lite_arm64:latest"
          cpu: "cortex-a53"
          cpu_info: "cpuinfo/raspberrypi_zero2_w_arm64"
          image_additional_mb: "4096"
          copy_repository_path: "/opt/smart-panel"
          copy_artifact_path: "smart-panel-server-arm64.tar.gz;smart-panel-server-arm64.tar.gz.sha256"
          copy_artifact_dest: "."
          commands: |
            apt-get update
            apt-get install -y curl git
            curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
            apt-get install -y nodejs
            cd /opt/smart-panel/build-arm64
            npm add @fastybird/smart-panel-backend@${{ needs.publish-backend.outputs.version }}
            npm add @fastybird/smart-panel-admin@${{ needs.publish-admin.outputs.version }}
            npm install --omit=dev
            cd /opt/smart-panel
            tar -czvf smart-panel-server-arm64.tar.gz -C ./build-arm64 .
            shasum -a 256 smart-panel-server-arm64.tar.gz > smart-panel-server-arm64.tar.gz.sha256

      - name: "Upload ARM64 Artifact (64-bit)"
        uses: "actions/upload-artifact@v7"
        with:
          name: "server-bundle-arm64"
          path: |
            smart-panel-server-arm64.tar.gz
            smart-panel-server-arm64.tar.gz.sha256

  pre-release-alpha:
    needs: ["sync-versions", "publish-admin", "publish-backend", "build-application", "build-android", "build-linux-desktop", "build-elinux"]
    name: "Create Alpha Pre Release"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Summary"
        run: |
          echo "### ✅ Alpha Release Created: v${{ needs.sync-versions.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Admin App: v${{ needs.publish-admin.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend App: v${{ needs.publish-backend.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Display App: v${{ needs.sync-versions.outputs.version }}" >> $GITHUB_STEP_SUMMARY

      - name: "Download ARMv7 Application Build (32-bit)"
        uses: "actions/download-artifact@v7"
        with:
          name: "server-bundle-armv7"

      - name: "Download ARM64 Application Build (64-bit)"
        uses: "actions/download-artifact@v7"
        with:
          name: "server-bundle-arm64"

      - name: "Download Android APK"
        uses: "actions/download-artifact@v7"
        with:
          name: "display-panel-android"

      - name: "Download Linux Desktop Build"
        uses: "actions/download-artifact@v7"
        with:
          name: "display-panel-linux-x64"

      - name: "Download eLinux Build"
        uses: "actions/download-artifact@v7"
        with:
          name: "display-panel-elinux-x64"

      - name: "Prepare Installation Scripts"
        run: |
          chmod +x scripts/install.sh
          cp scripts/install.sh install.sh
          chmod +x scripts/install-panel.sh
          cp scripts/install-panel.sh install-panel.sh

      - name: "Create Pre-Release & Upload Assets"
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: v${{ needs.sync-versions.outputs.version }}
          name: v${{ needs.sync-versions.outputs.version }}
          body: |
            Admin App v${{ needs.publish-admin.outputs.version }} & Backend App v${{ needs.publish-backend.outputs.version }} & Display App v${{ needs.sync-versions.outputs.version }}
          prerelease: true
          files: |
            smart-panel-server-armv7.tar.gz
            smart-panel-server-armv7.tar.gz.sha256
            smart-panel-server-arm64.tar.gz
            smart-panel-server-arm64.tar.gz.sha256
            smart-panel-display-android.apk
            smart-panel-display-android.apk.sha256
            smart-panel-display-linux-x64.tar.gz
            smart-panel-display-linux-x64.tar.gz.sha256
            smart-panel-display-elinux-x64.tar.gz
            smart-panel-display-elinux-x64.tar.gz.sha256
            install.sh
            install-panel.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Cleanup Old Alpha Pre-Releases"
        run: |
          gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease) | select(.tagName | test("alpha"; "i"))] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' | \
            while read -r tag; do
              echo "Deleting old alpha pre-release: $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    needs: "sync-versions"
    name: "Build & Push Docker Image"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@v4"

      - name: "Set up QEMU"
        uses: "docker/setup-qemu-action@v4"

      - name: "Login to GitHub Container Registry"
        uses: "docker/login-action@v4"
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and Push Docker Image"
        uses: "docker/build-push-action@v7"
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/fastybird/smart-panel:alpha
            ghcr.io/fastybird/smart-panel:${{ needs.sync-versions.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-to-discord:
    needs: [ "sync-versions", "publish-admin", "publish-backend", "build-application", "pre-release-alpha", "build-docker" ]
    name: "Discord Webhooks"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        operating-system: [ "ubuntu-latest" ]

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0

      - name: "Pull Updated Branch"
        run: git pull origin ${{ github.ref_name }}

      - name: "Send Discord Notification"
        uses: "./.github/actions/send-discord-notification"
        with:
          title: "FastyBird Smart Panel Alpha Release"
          description: "Version v${{ needs.sync-versions.outputs.version }}"
          url: "https://github.com/fastybird/smart-panel/releases/tag/v${{ needs.sync-versions.outputs.version }}"
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
