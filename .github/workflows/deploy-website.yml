name: "Deploy Website"

on:
  push:
    branches:
      - "main"
    paths:
      - "apps/website/**"
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: "deploy-website"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Build and deploy website to Cloudflare Pages"
    runs-on: "${{ matrix.operating-system }}"

    strategy:
      matrix:
        node-version: [ "24" ]
        pnpm-version: [ "10.12.0" ]
        operating-system: [ "ubuntu-latest" ]

    permissions:
      contents: read
      deployments: write

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Setup Node Project"
        uses: "./.github/actions/setup-node-project"
        with:
          node-version: "${{ matrix.node-version }}"
          pnpm-version: "${{ matrix.pnpm-version }}"

      - name: "Generate documentation"
        run: 'pnpm --filter @fastybird/smart-panel-website run generate:docs'

      - name: "Build"
        shell: "bash"
        run: 'pnpm --filter @fastybird/smart-panel-website build'

      - name: "Create Cloudflare Pages project (if not exists)"
        run: "npx wrangler@4 pages project create fastybird-smart-panel-website --production-branch=main 2>/dev/null || true"
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

      - name: "Deploy to Cloudflare Pages"
        run: "npx wrangler@4 pages deploy apps/website/out --project-name=fastybird-smart-panel-website --branch=main"
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
